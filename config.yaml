config:
  backup: true
  banner: true
  create: true
  dotpath: dotfiles
  keepdot: false
  link_dotfile_default: nolink
  link_on_import: nolink
  longkey: true
  impignore:
  - "*.log"
  cmpignore:
  - "*.log"
dotfiles:
  f_etc_keyd_default.conf:
    src: etc/keyd/default.conf
    dst: /etc/keyd/default.conf
  d_config_ibus_rime:
    src: config/ibus/rime
    dst: ~/.config/ibus/rime
    cmpignore:
    - '*'
    - '!/!(sync)/*.custom.yaml'
    upignore:
    - '*'
    - '!/!(sync)/*.custom.yaml'
    chmod: '700'
  f_config_1password_ssh_agent.toml:
    src: config/1Password/ssh/agent.toml
    dst: ~/.config/1Password/ssh/agent.toml
    chmod: '600'
  f_zshrc:
    src: zshrc
    dst: ~/.zshrc
  f_etc_fonts_local.conf:
    src: etc/fonts/local.conf
    dst: /etc/fonts/local.conf
  d_config_nvim:
    src: config/nvim
    dst: ~/.config/nvim
    cmpignore:
    - '*lock.json'
    upignore:
    - '*lock.json'
  d_config_zsh:
    src: config/zsh
    dst: ~/.config/zsh
    chmod: '700'
  d_config_oh-my-posh:
    src: config/oh-my-posh
    dst: ~/.config/oh-my-posh
  d_config_wezterm:
    src: config/wezterm
    dst: ~/.config/wezterm
  d_bin:
    src: bin
    dst: ~/bin
  d_config_sunshine:
    src: config/sunshine
    dst: ~/.config/sunshine
    cmpignore:
    - '*.pem'
    - '*state.json'
    upignore:
    - '*.pem'
    - '*state.json'
profiles:
  xian-linux-server:
    dotfiles:
    - f_etc_keyd_default.conf
    - d_config_ibus_rime
    - f_config_1password_ssh_agent.toml
    - f_zshrc
    - f_etc_fonts_local.conf
    - d_config_nvim
    - d_config_zsh
    - d_config_oh-my-posh
    - d_config_wezterm
    - d_bin
    - d_config_sunshine
