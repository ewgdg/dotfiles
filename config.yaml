config:
  backup: true
  banner: true
  create: true
  dotpath: dotfiles
  keepdot: false
  link_dotfile_default: nolink
  link_on_import: nolink
  longkey: true
  impignore: &global_ignore
  - '*.log'
  - '*.DS_Store'
  - '*/__pycache__'
  cmpignore: *global_ignore
  upignore: *global_ignore
  instignore: *global_ignore
dotfiles:
  f_etc_keyd_default.conf:
    src: etc/keyd/default.conf
    dst: /etc/keyd/default.conf
    actions:
    - install keyd
    - ensure-systemd-service-enabled system keyd.service
  d_config_keyd:
    src: config/keyd
    dst: ~/.config/keyd
    cmpignore: &keyd_app_ignore
    - app.lock
    upignore: *keyd_app_ignore
  f_config_systemd_user_keyd-application-mapper.service:
    src: config/systemd/user/keyd-application-mapper.service
    dst: ~/.config/systemd/user/keyd-application-mapper.service
    actions:
    - ensure-systemd-service-enabled user keyd-application-mapper.service
  f_config_systemd_user_niri-wait-for-tray-host.service:
    src: config/systemd/user/niri-wait-for-tray-host.service
    dst: ~/.config/systemd/user/niri-wait-for-tray-host.service
  f_config_systemd_user_niri-event-stream-rules.service:
    src: config/systemd/user/niri-event-stream-rules.service
    dst: ~/.config/systemd/user/niri-event-stream-rules.service
    actions:
    - ensure-systemd-service-enabled user niri-event-stream-rules.service
  f_config_systemd_user_niri-session-setup.service:
    src: config/systemd/user/niri-session-setup.service
    dst: ~/.config/systemd/user/niri-session-setup.service
    actions:
    - ensure-systemd-service-enabled user niri-session-setup.service
  f_config_systemd_user_noctalia-shell.service:
    src: config/systemd/user/noctalia-shell.service
    dst: ~/.config/systemd/user/noctalia-shell.service
    actions:
    - ensure-systemd-service-enabled user noctalia-shell.service
  f_config_systemd_user_drkonqi-coredump-launcher.socket.d_override.conf:
    src: config/systemd/user/drkonqi-coredump-launcher.socket.d/override.conf
    dst: ~/.config/systemd/user/drkonqi-coredump-launcher.socket.d/override.conf
  f_config_systemd_user_network-virtual-mic.service:
    src: config/systemd/user/network-virtual-mic.service
    dst: ~/.config/systemd/user/network-virtual-mic.service
    actions:
    - ensure-systemd-service-enabled user network-virtual-mic.service
  d_config_niri:
    src: config/niri
    dst: ~/.config/niri
    actions:
    - install 'niri xwayland-satellite xdg-desktop-portal-gnome jq'
  d_config_noctalia:
    src: config/noctalia
    dst: ~/.config/noctalia
    actions:
    - install 'noctalia-qs noctalia-shell'
    cmpignore: &noctalia_ignore
    - plugins
    - '!plugins/*/settings.json'
    - '!plugins/pinned-window'
    upignore: *noctalia_ignore
    instignore: *noctalia_ignore
  d_config_ibus_rime:
    src: config/ibus/rime
    dst: ~/.config/ibus/rime
    cmpignore: &rime_ignore
    - '*'
    - '!/!(sync)/*.custom.yaml'
    upignore: *rime_ignore
    chmod: '700'
  f_zshrc:
    src: zshrc
    dst: ~/.zshrc
  f_etc_fonts_local.conf:
    src: etc/fonts/local.conf
    dst: /etc/fonts/local.conf
  f_etc_nvidia_nvidia-application-profiles-rc.d_50-limit-free-buffer-pool-in-wayland-compositors.json:
    src: 
      etc/nvidia/nvidia-application-profiles-rc.d/50-limit-free-buffer-pool-in-wayland-compositors.json
    dst: 
      /etc/nvidia/nvidia-application-profiles-rc.d/50-limit-free-buffer-pool-in-wayland-compositors.json
  d_config_nvim:
    src: config/nvim
    dst: ~/.config/nvim
    actions:
    - install neovim
    cmpignore: &nvim_ignore
    - '*lock.json'
    - .nvimlog
    upignore: *nvim_ignore
  d_config_zsh:
    src: config/zsh
    dst: ~/.config/zsh
    chmod: '700'
    actions:
    - install 'fzf bat fd eza'
    - install zoxide
  d_config_oh-my-posh:
    src: config/oh-my-posh
    dst: ~/.config/oh-my-posh
    actions:
    - install oh-my-posh
  d_config_wezterm:
    src: config/wezterm
    dst: ~/.config/wezterm
  d_bin:
    src: bin
    dst: ~/bin
  d_config_sunshine:
    src: config/sunshine
    dst: ~/.config/sunshine
    cmpignore: &sunshine_ignore
    - '*/credentials/*'
    - '*state.json'
    - sunshine.conf
    - tests/*
    upignore: *sunshine_ignore
    actions:
    - symlink {{@@_dotfile_abs_dst@@}}/sunshine-{{@@desktop@@}}.conf 
      {{@@_dotfile_abs_dst@@}}/sunshine.conf
  d_etc_sddm.conf.d:
    src: etc/sddm.conf.d
    dst: /etc/sddm.conf.d
    cmpignore: &sddm_conf_d_ignore
    - zzz-autologin.local.conf
    upignore: *sddm_conf_d_ignore
  f_etc_mkinitcpio.conf:
    src: etc/mkinitcpio.conf
    dst: /etc/mkinitcpio.conf
  d_config_fcitx5:
    src: config/fcitx5
    dst: ~/.config/fcitx5
    chmod: '700'
    cmpignore: &fcitx_ignore
    - conf/cached_layouts
    - profile_*
    upignore: *fcitx_ignore
    actions:
    - install fcitx5-im
    - install fcitx5-chinese-addons
  f_config_kglobalshortcutsrc:
    src: config/kglobalshortcutsrc
    dst: ~/.config/kglobalshortcutsrc
    chmod: '600'
  f_gitconfig:
    src: gitconfig
    dst: ~/.gitconfig
    chmod: '600'
    actions:
    - install git lazygit
  f_config_lazygit_config.yml:
    src: config/lazygit/config.yml
    dst: ~/.config/lazygit/config.yml
    actions:
    - install lazygit
  d_config_1password_ssh:
    src: config/1Password/ssh
    dst: ~/.config/1Password/ssh
    chmod: '700'
    actions:
    - install '1password 1password-cli'
  d_config_systemd_user_sunshine.service.d:
    src: config/systemd/user/sunshine.service.d
    dst: ~/.config/systemd/user/sunshine.service.d
    actions:
    - install sunshine
    - ensure-systemd-service-enabled user sunshine.service
  d_ssh:
    src: ssh
    dst: ~/.ssh
    chmod: '700'
    template: false
    cmpignore: &ssh_ignore
    - known_hosts*
      # the config is a template file and should have a separate entry
      # to avoid being overwritten during update
    - config
    - agent
    upignore: *ssh_ignore
    instignore: *ssh_ignore
  f_ssh_config:
    src: ssh/config
    dst: ~/.ssh/config
  f_etc_makepkg.conf:
    src: etc/makepkg.conf
    dst: /etc/makepkg.conf
  f_etc_locale.gen:
    src: etc/locale.gen
    dst: /etc/locale.gen
    actions:
    - sh 'locale-gen'
  f_etc_pacman.conf:
    src: etc/pacman.conf
    dst: /etc/pacman.conf
  d_config_alacritty:
    src: config/alacritty
    dst: ~/.config/alacritty
    actions:
    - install alacritty
  d_config_tmux:
    src: config/tmux
    dst: ~/.config/tmux
    actions:
    - install tmux
    cmpignore: &tmux_ignore
    - plugins/*
    upignore: *tmux_ignore
    instignore: *tmux_ignore
  d_config_fd:
    src: config/fd
    dst: ~/.config/fd
  d_config_autostart:
    src: config/autostart
    dst: ~/.config/autostart
  d_etc_docker:
    src: etc/docker
    dst: /etc/docker
    actions:
    - install 'docker docker-compose lazydocker'
  f_config_plasmashellrc:
    src: config/plasmashellrc
    dst: ~/.config/plasmashellrc
    chmod: '600'
    actions:
    - install 'dolphin dolphin-plugins spectacle ark okular gwenview filelight 
      kate kcalc kwalletmanager kio-extras ffmpegthumbs'
  d_local_share_flatpak_overrides:
    src: local/share/flatpak/overrides
    dst: ~/.local/share/flatpak/overrides
  f_var_app_org.goldendict.goldendict_config_goldendict_config:
    template: false
    src: var/app/org.goldendict.GoldenDict/config/goldendict/config
    dst: ~/.var/app/org.goldendict.GoldenDict/config/goldendict/config
    trans_update: xml_transform_strip "--sort-attributes --selector-type remove --selectors {{@@ goldendict_config_selectors @@}}"
    trans_install: xml_transform_merge "--overlay-file '{{@@ _dotfile_abs_dst @@}}' --selector-type retain --selectors {{@@ goldendict_config_selectors @@}}"
  f_local_share_applications_1password-quickaccess.desktop:
    src: local/share/applications/1password-quickaccess.desktop
    dst: ~/.local/share/applications/1password-quickaccess.desktop
    chmod: '600'
  f_local_share_applications_goldendict-search.desktop:
    src: local/share/applications/goldendict-search.desktop
    dst: ~/.local/share/applications/goldendict-search.desktop
    chmod: '600'
    actions:
    - install flatpak
    - sh 'flatpak install --noninteractive flathub org.goldendict.GoldenDict'
  # Temporary Steam launcher override for Wayland IME input.
  # See docs/steam-ime-workaround.md and remove this once Steam's native
  # Wayland text input works reliably.
  f_local_share_applications_steam.desktop:
    src: local/share/applications/steam.desktop
    dst: ~/.local/share/applications/steam.desktop
    actions:
    - install steam
  f_zshenv:
    src: zshenv
    dst: ~/.zshenv
  f_profile:
    src: profile
    dst: ~/.profile
  f_npmrc:
    src: npmrc
    dst: ~/.npmrc
    chmod: '600'
  f_local_state_dotdrop_rustup-installed:
    src: local/state/dotdrop/rustup-installed
    dst: ~/.local/state/dotdrop/rustup-installed
    actions:
    - sh '{{@@ _dotdrop_dotpath @@}}/../scripts/install_rustup.sh'
  f_zprofile:
    src: zprofile
    dst: ~/.zprofile
  f_config_chrome-flags.conf:
    src: config/chrome-flags.conf
    dst: ~/.config/chrome-flags.conf
  f_config_chromium-flags.conf:
    src: config/chromium-flags.conf
    dst: ~/.config/chromium-flags.conf
  d_config_paru:
    src: config/paru
    dst: ~/.config/paru
  d_config_yay:
    src: config/yay
    dst: ~/.config/yay
  d_config_environment.d:
    src: config/environment.d
    dst: ~/.config/environment.d
  d_config_gtk-3.0:
    src: config/gtk-3.0
    dst: ~/.config/gtk-3.0
    chmod: '700'
    actions:
    - sh "env UV_CACHE_DIR=/tmp/uv-cache uv run '{{@@ _dotdrop_dotpath 
      @@}}/../scripts/sync_gtk_gsettings.py' '{{@@ _dotfile_abs_dst 
      @@}}/settings.ini'"
    cmpignore: &gtk3_ignore
    - assets/*
    - bookmarks
    - '*.backup.*'
    upignore: *gtk3_ignore
    instignore: *gtk3_ignore
  d_config_gtk-4.0:
    src: config/gtk-4.0
    dst: ~/.config/gtk-4.0
    chmod: '700'
  d_config_xdg-desktop-portal:
    src: config/xdg-desktop-portal
    dst: ~/.config/xdg-desktop-portal
  f_config_kscreenlockerrc:
    src: config/kscreenlockerrc
    dst: ~/.config/kscreenlockerrc
    chmod: '600'
  f_config_kdeglobals:
    src: config/kdeglobals
    dst: ~/.config/kdeglobals
    chmod: '600'
  f_config_kwinrulesrc:
    src: config/kwinrulesrc
    dst: ~/.config/kwinrulesrc
    chmod: '600'
  f_config_kwalletrc:
    src: config/kwalletrc
    dst: ~/.config/kwalletrc
    chmod: '600'
  f_etc_sddm.conf:
    src: etc/sddm.conf
    dst: /etc/sddm.conf
    actions:
    - install where-is-my-sddm-theme-git
  f_etc_plasmalogin.conf:
    src: etc/plasmalogin.conf
    dst: /etc/plasmalogin.conf
  f_codex_config.toml:
    src: codex/config.toml
    dst: ~/.codex/config.toml
    trans_update: toml_transform_strip "--selector-type remove --selectors {{@@ codex_config_selectors @@}}"
    trans_install: toml_transform_merge "--overlay-file '{{@@ _dotfile_abs_dst @@}}' --selector-type retain --selectors {{@@ codex_config_selectors @@}}"
  d_codex_rules:
    src: codex/rules
    dst: ~/.codex/rules
  d_agents:
    src: agents
    dst: ~/.agents
    cmpignore: &agents_ignore
    - skills/agent-web-context/references/openapi_cache/*
    - '*/__pycache__/*'
    upignore: *agents_ignore
    instignore: *agents_ignore
    actions:
    - sh 'mkdir -p ~/.codex ~/.claude'
    - symlink ~/.agents/AGENTS.md ~/.codex/AGENTS.md
    - symlink ~/.agents/AGENTS.md ~/.claude/CLAUDE.md
  f_Library_Preferences_GlobalPreferences.plist:
    src: Library/Preferences/.GlobalPreferences.plist
    dst: ~/Library/Preferences/.GlobalPreferences.plist
    chmod: '600'
    trans_update: plist_transform_strip "--output-format xml --selector-type retain --selectors {{@@ mac_global_preferences_config_selectors @@}}"
    trans_install: plist_transform_merge "--overlay-file '{{@@ _dotfile_abs_dst @@}}' --output-format binary --selector-type retain --selectors {{@@ mac_global_preferences_config_selectors @@}}"
  f_Library_Preferences_com_apple_symbolichotkeys.plist:
    src: Library/Preferences/com.apple.symbolichotkeys.plist
    dst: ~/Library/Preferences/com.apple.symbolichotkeys.plist
    chmod: '600'
    trans_update: plist_transform_strip "--output-format xml"
    trans_install: plist_transform_merge "--overlay-file '{{@@ _dotfile_abs_dst @@}}' --output-format binary"
  f_Library_Preferences_com_lujjjh_LinearMouse.plist:
    src: Library/Preferences/com.lujjjh.LinearMouse.plist
    dst: ~/Library/Preferences/com.lujjjh.LinearMouse.plist
    chmod: '600'
    trans_update: plist_transform_strip "--output-format xml --selector-type remove --selectors {{@@ linearmouse_config_selectors @@}}"
    trans_install: plist_transform_merge "--overlay-file '{{@@ _dotfile_abs_dst @@}}' --output-format binary --selector-type retain --selectors {{@@ linearmouse_config_selectors @@}}"
    actions:
    - install linearmouse
profiles:
  base:
    dotfiles:
    - f_gitconfig
    - d_ssh
    - f_ssh_config
    include:
    - apps_base
  apps_base:
    dotfiles:
    - d_config_nvim
    - f_config_lazygit_config.yml
    - d_config_1password_ssh
    - d_config_alacritty
  posix_base:
    include:
    - base
    - toolchain_javascript
    - toolchain_rust
    dotfiles:
      #- d_config_wezterm
    - f_zshrc
    - f_zshenv
    - f_profile
    - f_zprofile
    - d_config_zsh
    - d_config_oh-my-posh
    - d_config_tmux
    - d_config_fd
  posix_utils:
    actions:
    - install 'ripgrep jq trash-cli'
    dotfiles:
    - d_bin
  toolchain_javascript:
    actions:
    - install 'nodejs npm bun fnm'
    dotfiles:
    - f_npmrc
  toolchain_rust:
    dotfiles:
    - f_local_state_dotdrop_rustup-installed
  framework_gtk:
    dotfiles:
    - d_config_gtk-3.0
    - d_config_gtk-4.0
  os_linux:
    include:
    - posix_base
    - posix_utils
    - framework_gtk
    actions:
    - install zenity
    dotfiles:
    - f_etc_keyd_default.conf
    - d_config_keyd
    - f_config_systemd_user_keyd-application-mapper.service
    - f_config_systemd_user_network-virtual-mic.service
    - d_etc_docker
    - d_config_autostart
    - d_config_environment.d
    - d_config_xdg-desktop-portal
  os_arch:
    variables:
      install_cmd: sh '{{@@ _dotdrop_dotpath 
        @@}}/../scripts/install_arch_packages.sh' {0}
    include:
    - os_linux
    dotfiles:
    - f_etc_pacman.conf
    - f_etc_makepkg.conf
    - f_etc_locale.gen
    - f_etc_fonts_local.conf
    - d_config_paru
    - d_config_yay
  os_arch_kernel:
    dotfiles:
    - f_etc_mkinitcpio.conf
  de_gnome:
    variables:
      desktop: gnome
    dotfiles:
    - d_config_ibus_rime
    actions:
    - install seahorse   #password manager UI
  de_kde:
    variables:
      desktop: kde
    dotfiles:
    - d_etc_sddm.conf.d
    - f_config_kglobalshortcutsrc
    - f_config_plasmashellrc
    - f_config_kscreenlockerrc
    - f_config_kdeglobals
    - f_config_kwinrulesrc
    - f_config_kwalletrc
    - f_etc_sddm.conf
    - f_etc_plasmalogin.conf
  de_hypr:
    variables:
      desktop: hypr
  de_niri:
    variables:
      desktop: niri
    actions:
    - install 'bibata-cursor-theme-bin papirus-icon-theme adw-gtk-theme 
      nwg-look'
    dotfiles:
    - f_etc_nvidia_nvidia-application-profiles-rc.d_50-limit-free-buffer-pool-in-wayland-compositors.json
    - d_config_niri
    - f_config_systemd_user_niri-event-stream-rules.service
    - f_config_systemd_user_niri-session-setup.service
    - f_config_systemd_user_niri-wait-for-tray-host.service
    - d_config_noctalia
    - f_config_systemd_user_noctalia-shell.service
  os_mac:
    variables:
      install_cmd: sh '{{@@ _dotdrop_dotpath @@}}/../scripts/install_homebrew_packages.sh' {0}
      mac_global_preferences_config_selectors: >-
        NSUserKeyEquivalents ApplePressAndHoldEnabled AppleKeyboardUIMode AppleShowAllExtensions AppleInterfaceStyle com.apple.keyboard.fnState com.apple.swipescrolldirection com.apple.trackpad.forceClick com.apple.trackpad.scaling com.apple.mouse.scaling com.apple.scrollwheel.scaling NSAutomaticSpellingCorrectionEnabled NSAutomaticCapitalizationEnabled NSAutomaticDashSubstitutionEnabled NSAutomaticPeriodSubstitutionEnabled NSAutomaticQuoteSubstitutionEnabled NSAutomaticTextCompletionEnabled
    include:
    - posix_base
    - posix_utils
    dotfiles:
    - f_Library_Preferences_GlobalPreferences.plist
    - f_Library_Preferences_com_apple_symbolichotkeys.plist
  xian-macbook-air.local:
    include:
    - os_mac
    - apps_mac
    - apps_ai
  xian-linux-server:
    variables:
      desktop: niri
    include:
    - os_arch
    - de_niri
    - de_kde
    - apps_linux
    - apps_ai
    dotfiles:
    - d_config_sunshine
    - d_config_systemd_user_sunshine.service.d
  apps_linux:
    variables:
      goldendict_config_selectors: >-
        'config/*WindowGeometry' 'config/*WindowState' 'config/timeForNewReleaseCheck'
    dotfiles:
    - d_config_fcitx5
    - f_local_share_applications_1password-quickaccess.desktop
    - f_local_share_applications_goldendict-search.desktop
    - f_local_share_applications_steam.desktop
    - f_config_chrome-flags.conf
    - f_config_chromium-flags.conf
    - d_local_share_flatpak_overrides
    - f_var_app_org.goldendict.goldendict_config_goldendict_config
    - f_config_systemd_user_drkonqi-coredump-launcher.socket.d_override.conf
    actions:
    - install yazi
  apps_mac:
    variables:
      linearmouse_config_selectors: >-
        LaunchAtLogin__hasMigrated 'NSStatusItem Preferred Position Item-0' 'NSWindow Frame SUUpdateAlert' SUEnableAutomaticChecks SUHasLaunchedBefore SULastCheckTime SUScheduledCheckInterval SUUpdateGroupIdentifier
    dotfiles:
    - f_Library_Preferences_com_lujjjh_LinearMouse.plist
  apps_ai:
    variables:
      # Strip local Codex state from repo updates, then preserve it from the
      # live file during install.
      codex_config_selectors: >-
        'model' 'model_reasoning_effort' 're:^projects\.' 're:^mcp_servers\.playwright\.env$'
    dotfiles:
    - f_codex_config.toml
    - d_codex_rules
    - d_agents
    actions:
    - sh 'bun add -g context-mode@latest @oh-my-pi/pi-coding-agent'

variables:
  install_cmd: echo 'no install cmd for {0} >&2'
  symlink_cmd: ln -sfn {0} {1}
actions:
  install: '{{@@ install_cmd @@}}'
  symlink: '{{@@ symlink_cmd @@}}'
  ensure-systemd-service-enabled: sh '{{@@ _dotdrop_dotpath 
    @@}}/../scripts/ensure_systemd_service_enabled.sh' {0} {1}
  sh: sh -c "{0}"
  git-clone: if [ -d "{1}" ]; then cd "{1}" && git pull --depth=1; else git 
    clone --depth=1 {0} "{1}"; fi
trans_update:
  toml_transform_strip: uv run --project '{{@@ _dotdrop_dotpath @@}}/..' '{{@@ _dotdrop_dotpath @@}}/../scripts/toml_transform.py' {0} {1} --mode cleanup
    {2} --compare-file "{{@@ _dotfile_abs_src @@}}"
  xml_transform_strip: python '{{@@ _dotdrop_dotpath 
    @@}}/../scripts/xml_transform.py' {0} {1} --mode cleanup {2} --compare-file "{{@@ _dotfile_abs_src @@}}"
  plist_transform_strip: python3 '{{@@ _dotdrop_dotpath @@}}/../scripts/plist_transform.py'
    {0} {1} --mode cleanup {2} --compare-file "{{@@ _dotfile_abs_src @@}}"
trans_install:
  toml_transform_merge: uv run --project '{{@@ _dotdrop_dotpath @@}}/..' '{{@@ _dotdrop_dotpath @@}}/../scripts/toml_transform.py' {0} {1} --mode merge
    {2} --compare-file "{{@@ _dotfile_abs_dst @@}}"
  xml_transform_merge: python '{{@@ _dotdrop_dotpath @@}}/../scripts/xml_transform.py' {0}
    {1} --mode merge {2} --compare-file "{{@@ _dotfile_abs_dst @@}}"
  plist_transform_merge: python3 '{{@@ _dotdrop_dotpath 
    @@}}/../scripts/plist_transform.py' {0} {1} --mode merge {2} --compare-file "{{@@ _dotfile_abs_dst @@}}"
