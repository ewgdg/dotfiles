config:
  backup: true
  banner: true
  create: true
  dotpath: dotfiles
  keepdot: false
  link_dotfile_default: nolink
  link_on_import: nolink
  longkey: true
  impignore: &global_ignore
  - '*.log'
  - '*.DS_Store'
  cmpignore: *global_ignore
  upignore: *global_ignore
  instignore: *global_ignore
dotfiles:
  f_etc_keyd_default.conf:
    src: etc/keyd/default.conf
    dst: /etc/keyd/default.conf
    actions:
    - install keyd
  d_config_keyd:
    src: config/keyd
    dst: ~/.config/keyd
    cmpignore: &keyd_app_ignore
    - app.lock
    upignore: *keyd_app_ignore
  f_config_systemd_user_keyd-application-mapper.service:
    src: config/systemd/user/keyd-application-mapper.service
    dst: ~/.config/systemd/user/keyd-application-mapper.service
  d_config_ibus_rime:
    src: config/ibus/rime
    dst: ~/.config/ibus/rime
    cmpignore: &rime_ignore
    - '*'
    - '!/!(sync)/*.custom.yaml'
    upignore: *rime_ignore
    chmod: '700'
  f_zshrc:
    src: zshrc
    dst: ~/.zshrc
    actions:
    - install 'fzf bat fd eza rg'
    - install zoxide
  f_etc_fonts_local.conf:
    src: etc/fonts/local.conf
    dst: /etc/fonts/local.conf
  d_config_nvim:
    src: config/nvim
    dst: ~/.config/nvim
    actions:
    - install neovim
    cmpignore: &nvim_ignore
    - '*lock.json'
    - lazyvim.json
    upignore: *nvim_ignore
  d_config_zsh:
    src: config/zsh
    dst: ~/.config/zsh
    chmod: '700'
  d_config_oh-my-posh:
    src: config/oh-my-posh
    dst: ~/.config/oh-my-posh
    actions:
    - install oh-my-posh
  d_config_wezterm:
    src: config/wezterm
    dst: ~/.config/wezterm
  d_bin:
    src: bin
    dst: ~/bin
  d_config_sunshine:
    src: config/sunshine
    dst: ~/.config/sunshine
    cmpignore: &sunshine_ignore
    - '*/credentials/*'
    - '*state.json'
    - sunshine.conf
    upignore: *sunshine_ignore
    actions:
    - |
      sh
      'if [[ {{@@ desktop @@}} == kde ]]; then
        trash {{@@ _dotfile_abs_dst @@}}/sunshine.conf;
        ln -s {{@@ _dotfile_abs_dst @@}}/sunshine.conf.kde {{@@ _dotfile_abs_dst @@}}/sunshine.conf
      elif [[ {{@@ desktop @@}} == gnome ]]; then
        trash {{@@ _dotfile_abs_dst @@}}/sunshine.conf;
        ln -s {{@@ _dotfile_abs_dst @@}}/sunshine.conf.gnome {{@@ _dotfile_abs_dst @@}}/sunshine.conf
      fi'
  d_etc_sddm.conf.d:
    src: etc/sddm.conf.d
    dst: /etc/sddm.conf.d
  f_etc_mkinitcpio.conf:
    src: etc/mkinitcpio.conf
    dst: /etc/mkinitcpio.conf
  d_config_fcitx5:
    src: config/fcitx5
    dst: ~/.config/fcitx5
    chmod: '700'
    cmpignore: &fcitx_ignore
    - conf/cached_layouts
    upignore: *fcitx_ignore
    actions:
    - install fcitx5-im
    - install fcitx5-chinese-addons
  f_config_kglobalshortcutsrc:
    src: config/kglobalshortcutsrc
    dst: ~/.config/kglobalshortcutsrc
    chmod: '600'
  f_gitconfig:
    src: gitconfig
    dst: ~/.gitconfig
    chmod: '600'
  d_config_1password_ssh:
    src: config/1Password/ssh
    dst: ~/.config/1Password/ssh
    chmod: '700'
  d_config_systemd_user_sunshine.service.d:
    src: config/systemd/user/sunshine.service.d
    dst: ~/.config/systemd/user/sunshine.service.d
  d_ssh:
    src: ssh
    dst: ~/.ssh
    chmod: '700'
    template: false
    cmpignore: &ssh_ignore
    - known_hosts*
    # the config is a template file and should have a separate entry 
    # to avoid being overwritten during update
    - config
    upignore: *ssh_ignore
    instignore: *ssh_ignore
  f_ssh_config:
    src: ssh/config
    dst: ~/.ssh/config
  f_etc_makepkg.conf:
    src: etc/makepkg.conf
    dst: /etc/makepkg.conf
  d_config_alacritty:
    src: config/alacritty
    dst: ~/.config/alacritty
    actions:
    - install alacritty
  d_config_tmux:
    src: config/tmux
    dst: ~/.config/tmux
    actions:
    - install tmux
  d_config_fd:
    src: config/fd
    dst: ~/.config/fd
  d_config_autostart:
    src: config/autostart
    dst: ~/.config/autostart
  d_etc_docker:
    src: etc/docker
    dst: /etc/docker
    actions:
    - install 'docker docker-compose lazydocker'
  f_config_plasmanotifyrc:
    src: config/plasmanotifyrc
    dst: ~/.config/plasmanotifyrc
    chmod: '600'
  f_config_plasmashellrc:
    src: config/plasmashellrc
    dst: ~/.config/plasmashellrc
    chmod: '600'
  d_local_share_flatpak_overrides:
    src: local/share/flatpak/overrides
    dst: ~/.local/share/flatpak/overrides
  f_var_app_org.goldendict.goldendict_config_goldendict_config:
    template: false
    src: var/app/org.goldendict.GoldenDict/config/goldendict/config
    dst: ~/.var/app/org.goldendict.GoldenDict/config/goldendict/config
    trans_update: xml_sort_attr_rm_nodes "config/*WindowGeometry,config/*WindowState,config/timeForNewReleaseCheck"
    trans_install: xml_merge
  f_local_share_applications_1password-quickaccess.desktop:
    src: local/share/applications/1password-quickaccess.desktop
    dst: ~/.local/share/applications/1password-quickaccess.desktop
    chmod: '600'
  f_local_share_applications_goldendict-search.desktop:
    src: local/share/applications/goldendict-search.desktop
    dst: ~/.local/share/applications/goldendict-search.desktop
    chmod: '600'
profiles:
  base:
    dotfiles:
    - d_config_nvim
    - f_gitconfig
    - d_ssh
    - f_ssh_config
    - d_config_1password_ssh
    - d_config_alacritty
  posix_base:
    include:
    - base
    dotfiles:
    #- d_config_wezterm
    - f_zshrc
    - d_config_zsh
    - d_config_oh-my-posh
    - d_config_tmux
    - d_config_fd
    actions:
    - install 'git lazygit'
    - install ripgrep
  posix_utils:
    dotfiles:
    - d_bin
  os_linux:
    include:
    - posix_base
    - posix_utils
    dotfiles:
    - f_etc_keyd_default.conf
    - d_config_keyd
    - f_config_systemd_user_keyd-application-mapper.service
    - d_etc_docker
    - d_config_autostart
    - d_local_share_flatpak_overrides
    - f_var_app_org.goldendict.goldendict_config_goldendict_config
  os_arch:
    variables:
      install_cmd: yay -S --needed --answerdiff=None --answeredit=None --removemake
        {0}
    include:
    - os_linux
    dotfiles:
    - f_etc_makepkg.conf
    - f_etc_fonts_local.conf
  os_arch_kernel:
    dotfiles:
    - f_etc_mkinitcpio.conf
  de_gnome:
    variables:
      desktop: gnome
    dotfiles:
    - d_config_ibus_rime
    actions:
    - install seahorse #password manager UI
  de_kde:
    variables:
      desktop: kde
    dotfiles:
    - d_etc_sddm.conf.d
    - f_config_kglobalshortcutsrc
    - d_config_fcitx5
    - f_config_plasmanotifyrc
    - f_config_plasmashellrc
    - f_local_share_applications_1password-quickaccess.desktop
    - f_local_share_applications_goldendict-search.desktop
    actions:
    - install 'dolphin dolphin-plugins spectacle ark okular gwenview filelight kate
      kcalc kwalletmanager kio-extras ffmpegthumbs'
  os_mac:
    variables:
      install_cmd: brew install --quiet {0}
    include:
    - posix_base
  xian-linux-server:
    include:
    - os_arch
    - de_kde
    dotfiles:
    - d_config_sunshine
    - d_config_systemd_user_sunshine.service.d
variables:
  install_cmd: echo 'no install cmd for {0} >&2'
  symlink_cmd: ln -s {0} {1}
actions:
  install: '{{@@ install_cmd @@}}'
  symlink: '{{@@ symlink_cmd @@}}'
  sh: sh -c "{0}"
trans_update:
  xml_sort_attr_rm_nodes: python '{{@@ _dotdrop_dotpath @@}}/../scripts/xmlformat.py'
    {0} {1} --sort_attributes --remove_nodes {2}
trans_install:
  xml_merge: python '{{@@ _dotdrop_dotpath @@}}/../scripts/xmlformat.py' '{{@@ _dotfile_abs_dst
    @@}}' {1} --merge_file {0}
