[ignore]
pull = [
    "*.dotdropbak",
    "*.bak",
    "__pycache__/",
    ".DS_Store",
]
push = [
    "*.archived",
    "*.bak",
    "__pycache__/",
    ".DS_Store",
]

[vars]
ENABLE_DISPLAY_MANAGER_SYSTEMD_UNIT = '{{ UV_RUN }} "$DOTMAN_REPO_ROOT/scripts/enable_display_manager_systemd_unit.py"'

[hooks]
guard_push = [
    'sh "$DOTMAN_REPO_ROOT/scripts/check_core_env.sh"',
]
