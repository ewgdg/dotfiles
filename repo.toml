default_command_elevation = "intercept"

[ignore]
shared = [
    "*.archived",
    "*.bak",
    "__pycache__/",
    ".DS_Store",
    ".codex",
    "node_modules/",
    ".venv/",
]
pull = [
    "*.dotdropbak",
]
push = []
skip_markers = [".dotman-skip"]

[hooks]
guard_push = [
    'sh "$DOTMAN_REPO_ROOT/scripts/check_core_env.sh"',
]
