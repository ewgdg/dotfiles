default_command_elevation = "intercept"

[ignore]
pull = [
    "*.dotdropbak",
    "*.bak",
    "__pycache__/",
    ".DS_Store",
    ".codex",
    "node_modules/",
]
push = [
    "*.archived",
    "*.bak",
    "__pycache__/",
    ".DS_Store",
    ".codex",
    "node_modules/",
]

[hooks]
guard_push = [
    'sh "$DOTMAN_REPO_ROOT/scripts/check_core_env.sh"',
]
