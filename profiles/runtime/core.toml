[vars]
UV_RUN = "uv run --project \"$DOTMAN_REPO_ROOT\""
NPM_INSTALL = "npm install --no-audit --no-fund --loglevel=error -g"
RUSTUP_EXTRA_TARGETS = ""
XML_TRANSFORM = "dotman transform xml"
TOML_TRANSFORM = "dotman transform toml"
PLIST_TRANSFORM = "dotman transform plist"
JSON_TRANSFORM = "dotman transform json"

XML_RENDER = "{{ XML_TRANSFORM }} \"$DOTMAN_LIVE_PATH\" --stdout --mode merge --overlay-file \"$DOTMAN_REPO_PATH\" --compare-file \"$DOTMAN_LIVE_PATH\""
TOML_RENDER = "{{ TOML_TRANSFORM }} \"$DOTMAN_LIVE_PATH\" --stdout --mode merge --overlay-file \"$DOTMAN_REPO_PATH\" --compare-file \"$DOTMAN_LIVE_PATH\""
PLIST_RENDER = "{{ PLIST_TRANSFORM }} \"$DOTMAN_LIVE_PATH\" --stdout --mode merge --overlay-file \"$DOTMAN_REPO_PATH\" --compare-file \"$DOTMAN_LIVE_PATH\""
JSON_RENDER = "{{ JSON_TRANSFORM }} \"$DOTMAN_LIVE_PATH\" --stdout --mode merge --overlay-file \"$DOTMAN_REPO_PATH\" --compare-file \"$DOTMAN_LIVE_PATH\""

XML_CAPTURE = "{{ XML_TRANSFORM }} \"$DOTMAN_LIVE_PATH\" --stdout --mode cleanup --compare-file \"$DOTMAN_REPO_PATH\""
TOML_CAPTURE = "{{ TOML_TRANSFORM }} \"$DOTMAN_LIVE_PATH\" --stdout --mode cleanup --compare-file \"$DOTMAN_REPO_PATH\""
PLIST_CAPTURE = "{{ PLIST_TRANSFORM }} \"$DOTMAN_LIVE_PATH\" --stdout --mode cleanup --compare-file \"$DOTMAN_REPO_PATH\""
JSON_CAPTURE = "{{ JSON_TRANSFORM }} \"$DOTMAN_LIVE_PATH\" --stdout --mode cleanup --compare-file \"$DOTMAN_REPO_PATH\""
