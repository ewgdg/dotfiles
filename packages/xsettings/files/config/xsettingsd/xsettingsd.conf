# Managed portal-backed keys refresh during capture.
# DPI keys intentionally omitted for now. We want to verify that xwayland-satellite
# wp_viewporter scaling is enough once xsettingsd owns XSETTINGS before adding
# Niri-scale-based DPI rendering.
# Other lines stay tracked verbatim until we map them explicitly.

Gtk/EnableAnimations 1
Gtk/DecorationLayout "appmenu:close"
Gtk/PrimaryButtonWarpsSlider 1
Gtk/ToolbarStyle 3
Gtk/MenuImages 1
Gtk/ButtonImages 1
Net/CursorBlinkTime 1200
Net/CursorBlink 1
Gtk/CursorThemeSize 24
Net/SoundThemeName "freedesktop"
Gtk/FontName "Adwaita Sans 11"
Net/ThemeName "adw-gtk3-dark"
Net/IconThemeName "Papirus-Dark"
Gtk/CursorThemeName "Bibata-Modern-Ice"
Net/EnableEventSounds 1
Net/EnableInputFeedbackSounds 0
Xft/Antialias 1
Xft/Hinting 1
Xft/HintStyle "hintslight"
Xft/RGBA "none"
