id = "btrfs/snapper"
description = "Snapper snapshot configuration and timers"

[targets.f_etc_conf_d_snapper]
source = "files/etc/conf.d/snapper"
path = "/etc/conf.d/snapper"

# Snapper may leave these configs at 0640 root:root when created from live state.
# Keep them world-readable: they contain policy only, no secrets, and user tools may inspect them.
[targets.f_etc_snapper_configs_root]
source = "files/etc/snapper/configs/root"
path = "/etc/snapper/configs/root"
chmod = "644"

[targets.f_etc_snapper_configs_home]
source = "files/etc/snapper/configs/home"
path = "/etc/snapper/configs/home"
chmod = "644"

[hooks]
pre_push = [
  "{{ INSTALL }} snapper btrfs-assistant",
]
post_push = [
  # Current snapshot policy relies on timeline + cleanup timers. boot timer stays unmanaged/off.
  '{{ ENSURE_SYSTEMD }} system snapper-timeline.timer',
  '{{ ENSURE_SYSTEMD }} system snapper-cleanup.timer',
]
