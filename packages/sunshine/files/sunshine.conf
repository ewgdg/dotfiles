{% set session = vars.desktop.session -%}
{% set prep_args = "--solo --scale dpi-auto --inhibit" -%}
address_family = both
capture = portal
csrf_allowed_origins = https://sunshine.service.xianzzz.com
ds5_inputtino_randomize_mac = disabled
{% if session == "gnome" -%}
global_prep_cmd = [{"do":"true","undo":"true"}]
{% else -%}
global_prep_cmd = [{"do":"sh -c \"python3 ${XDG_CONFIG_HOME:-$HOME/.config}/sunshine/sunshine-prep-{{ session }}.py do --width ${SUNSHINE_CLIENT_WIDTH} --height ${SUNSHINE_CLIENT_HEIGHT} --fps ${SUNSHINE_CLIENT_FPS}{% if prep_args %} {{ prep_args }}{% endif %}\"","undo":"sh -c \"python3 ${XDG_CONFIG_HOME:-$HOME/.config}/sunshine/sunshine-prep-{{ session }}.py undo\""}]
{% endif -%}
lan_encryption_mode = 1
stream_audio = true
