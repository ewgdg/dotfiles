{% set session = vars.desktop.session -%}
{% set headless_capture = session == "niri" -%}
{% set capture_backend = "wlr" if headless_capture else "kms" -%}
{% set prep_args = "--solo --scale dpi-auto" -%}
{# KMS capture can spam DPMS errors if outputs idle mid-stream. WLR/Niri
   headless capture does not need default idle inhibition; keep it opt-in. #}
{% if capture_backend == "kms" -%}
{% set prep_args = prep_args ~ " --inhibit" -%}
{% endif -%}
{% if headless_capture -%}
{% set prep_args = prep_args ~ " --headless" -%}
{% endif -%}
{% set niri_bin_prefix = "" -%}
{% if session == "niri" and vars.niri is defined and vars.niri.bin -%}
{% set niri_bin_prefix -%}NIRI_BIN='{{ vars.niri.bin }}' {% endset -%}
{% endif -%}
address_family = both
capture = {{ capture_backend }}
{% if session == "niri" -%}
output_name = sunshine
{% endif -%}
csrf_allowed_origins = https://sunshine.service.xianzzz.com
ds5_inputtino_randomize_mac = disabled
{% if session == "gnome" -%}
global_prep_cmd = [{"do":"true","undo":"true"}]
{% else -%}
global_prep_cmd = [{"do":"sh -c \"{{ niri_bin_prefix }}python3 ${XDG_CONFIG_HOME:-$HOME/.config}/sunshine/sunshine-prep-{{ session }}.py do --width ${SUNSHINE_CLIENT_WIDTH} --height ${SUNSHINE_CLIENT_HEIGHT} --fps ${SUNSHINE_CLIENT_FPS}{% if prep_args %} {{ prep_args }}{% endif %}\"","undo":"sh -c \"{{ niri_bin_prefix }}python3 ${XDG_CONFIG_HOME:-$HOME/.config}/sunshine/sunshine-prep-{{ session }}.py undo\""}]
{% endif -%}
lan_encryption_mode = 1
stream_audio = true
system_tray = disabled
