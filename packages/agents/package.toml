id = "agents"
description = "Shared agent skill repository"

depends = [
  "nodejs",
]

[targets.d_agents]
source = "files/agents"
path = "~/.agents"
push_ignore = [
  "skills/agent-web-context/references/openapi_cache/",
  "*/__pycache__/",
]
pull_ignore = [
  "skills/agent-web-context/references/openapi_cache/",
  "*/__pycache__/",
]

[targets.f_local_state_skills_skill_lock_json]
source = "files/local/state/skills/.skill-lock.json"
path = "~/.local/state/skills/.skill-lock.json"

[hooks]
pre_push = [
  'mkdir -p "$HOME/.codex" "$HOME/.claude" "$HOME/.pi/agent"',
  "bun install -g @mariozechner/pi-coding-agent",
]
