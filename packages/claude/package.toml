id = "claude"

[vars.claude]
# Model choice is a live-local preference and should not be forced by repo sync.
settings_selectors = ["model"]

[targets.f_claude_claude_md]
source = "files/claude/CLAUDE.md"
path = "~/.claude/CLAUDE.md"

[targets.f_claude_settings_json]
source = "files/claude/settings.json"
path = "~/.claude/settings.json"
chmod = "600"
render = '{{ JSON_RENDER }} --selector-type retain --selectors {{ vars.claude.settings_selectors|shell_args }}'
capture = '{{ JSON_CAPTURE }} --selector-type remove --selectors {{ vars.claude.settings_selectors|shell_args }}'

[targets.f_claude_statusline_js]
source = "files/claude/statusline.js"
path = "~/.claude/statusline.js"
chmod = "755"

[targets.f_claude_subagent_statusline_js]
source = "files/claude/subagent-statusline.js"
path = "~/.claude/subagent-statusline.js"
chmod = "755"

[targets.d_claude_hooks]
source = "files/claude/hooks"
path = "~/.claude/hooks"

[targets.d_claude_agents]
source = "files/claude/agents"
path = "~/.claude/agents"

[targets.d_claude_commands]
source = "files/claude/commands"
path = "~/.claude/commands"

[targets.d_claude_skills]
source = "files/claude/skills"
path = "~/.claude/skills"
disabled = true
