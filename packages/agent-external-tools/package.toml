id = "agent-external-tools"
description = "External CLIs for AI agent workflows"

depends = [
  "go-lang",
]

[targets.crit_latest]
sync_policy = "push-only"
probe = 'bash "$DOTMAN_PACKAGE_ROOT/scripts/needs_crit_update.sh"'
disabled = true

[targets.crit_latest.hooks]
# Root module releases currently contain no package; CLI main lives under cmd/crit.
pre_push = "go install github.com/tomasz-tomczyk/crit/cmd/crit@latest"

[targets.herdr_installed]
sync_policy = "push-only"
probe = 'if command -v herdr >/dev/null 2>&1; then exit 100; fi; exit 0'

[targets.herdr_installed.hooks]
pre_push = "curl -fsSL https://herdr.dev/install.sh | sh"

[targets.f_config_herdr_config_toml]
source = "files/config/herdr/config.toml"
path = "~/.config/herdr/config.toml"
