id = "agent-external-tools"
description = "External CLIs for AI agent workflows"

depends = [
  "go-lang",
  "nodejs",
]

[targets.crit_current]
sync_policy = "push-only"
probe = 'bash "$DOTMAN_PACKAGE_ROOT/scripts/needs_crit_update.sh"'

[targets.crit_current.hooks]
pre_push = "go install github.com/tomasz-tomczyk/crit@latest"

[targets.surf_cli_current]
sync_policy = "push-only"
probe = 'bash "$DOTMAN_PACKAGE_ROOT/scripts/needs_surf_cli_update.sh"'

[targets.surf_cli_current.hooks]
pre_push = "{{ NPM_INSTALL }} surf-cli"
