id = "arch-system"
description = "Arch Linux package manager and base system configuration"

[vars.arch_system]
# Keep version repo-managed so stale repo config can still trigger yay's own
# migration path; only buildDir is machine-local state.
yay_config_selector_args = "'buildDir'"

[targets.f_etc_pacman_conf]
source = "files/etc/pacman.conf"
path = "/etc/pacman.conf"

[targets.f_etc_makepkg_conf]
source = "files/etc/makepkg.conf"
path = "/etc/makepkg.conf"

[targets.f_etc_locale_gen]
source = "files/etc/locale.gen"
path = "/etc/locale.gen"

[targets.f_etc_fonts_local_conf]
source = "files/etc/fonts/local.conf"
path = "/etc/fonts/local.conf"

[targets.d_config_paru]
source = "files/config/paru"
path = "~/.config/paru"

[targets.f_config_yay_config_json]
source = "files/config/yay/config.json"
path = "~/.config/yay/config.json"
render = '{{ JSON_RENDER }} --selector-type retain --selectors {{ vars.arch_system.yay_config_selector_args }}'
capture = '{{ JSON_CAPTURE }} --selector-type remove --selectors {{ vars.arch_system.yay_config_selector_args }}'

[hooks]
post_push = [
  'if [ "$(id -u)" -eq 0 ]; then locale-gen; else sudo -A locale-gen; fi',
]
