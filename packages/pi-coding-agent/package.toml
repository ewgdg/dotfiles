id = "pi-coding-agent"

depends = [
  "nodejs",
]

[vars.pi_coding_agent]
# Volatile runtime preferences stay live-local so repo pushes do not force stale
# provider/model/thinking choices or re-run old changelog/update handling.
settings_selector_args = "'defaultProvider' 'defaultModel' 'lastChangelogVersion' 'defaultThinkingLevel' 'hideThinkingBlock'"

[targets.d_pi_agent]
source = "files/pi/agent"
path = "~/.pi/agent"

[targets.d_pi_agent.ignore]
shared = [
  # Runtime state and caches stay local; everything else under ~/.pi/agent is config worth backing up.
  "auth.json",
  "codex-accounts.json",
  "git/",
  "npm/",
  "run-history.jsonl",
  "sessions/",
  "trust.json",
]

[[targets.d_pi_agent.path_rules]]
pattern = "settings.json"
render = '{{ JSON_RENDER }} --selector-type retain --selectors {{ vars.pi_coding_agent.settings_selector_args }}'
capture = '{{ JSON_CAPTURE }} --selector-type remove --selectors {{ vars.pi_coding_agent.settings_selector_args }}'

[targets.pi_coding_agent_install]
sync_policy = "push-only"
probe = 'if command -v pi >/dev/null 2>&1; then exit 100; fi; exit 0'

[targets.pi_coding_agent_install.hooks]
pre_push = "{{ NPM_INSTALL }} @earendil-works/pi-coding-agent"
