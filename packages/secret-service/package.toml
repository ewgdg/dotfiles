id = "secret-service"
description = "KWallet-backed Freedesktop Secret Service and client tooling"

[targets.f_config_kwalletrc]
source = "files/config/kwalletrc"
path = "~/.config/kwalletrc"
chmod = "600"

[targets.f_local_state_dotman_installed_secret_service]
source = "files/local/state/dotman/installed/secret-service"
path = "~/.local/state/dotman/installed/secret-service"

[hooks]
# KWallet provides ksecretd for the Secret portal and Secret Service API;
# libsecret provides common client libraries/tooling used by Electron apps and
# `secret-tool` diagnostics. kwalletmanager is the matching GUI editor.
pre_push = [
  "{{ INSTALL }} kwallet kwalletmanager libsecret",
]

