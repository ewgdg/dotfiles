id = "secret-service"
description = "KWallet-backed Freedesktop Secret Service and client tooling"

[targets.f_config_kwalletrc]
source = "files/config/kwalletrc"
path = "~/.config/kwalletrc"
chmod = "600"

[targets.kwallet_installed]
sync_policy = "push-only"
probe = '{{ PROBE_PACKAGES_INSTALLED }} kwallet'

[targets.kwallet_installed.hooks]
# KWallet provides ksecretd for the Secret portal and Secret Service API.
pre_push = "{{ INSTALL }} kwallet"

[targets.libsecret_installed]
sync_policy = "push-only"
probe = '{{ PROBE_PACKAGES_INSTALLED }} libsecret'

[targets.libsecret_installed.hooks]
# libsecret provides common client libraries/tooling used by Electron apps and `secret-tool` diagnostics.
pre_push = "{{ INSTALL }} libsecret"

[targets.kwalletmanager_installed]
sync_policy = "push-only"
probe = '{{ PROBE_PACKAGES_INSTALLED }} kwalletmanager'

[targets.kwalletmanager_installed.hooks]
# Matching GUI editor for KWallet state.
pre_push = "{{ INSTALL }} kwalletmanager"

[targets.seahorse_installed]
sync_policy = "push-only"
probe = '{{ PROBE_PACKAGES_INSTALLED }} seahorse'

[targets.seahorse_installed.hooks]
pre_push = "{{ INSTALL }} seahorse"
