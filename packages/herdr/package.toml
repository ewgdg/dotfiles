id = "herdr"
description = "Herdr terminal workspace manager"

[targets.installed]
sync_policy = "push-only"
probe = 'if command -v herdr >/dev/null 2>&1; then exit 100; fi; exit 0'

[targets.installed.hooks]
pre_push = "curl -fsSL https://herdr.dev/install.sh | sh"

[targets.config]
source = "files/config/herdr/config.toml"
path = "~/.config/herdr/config.toml"

[targets.reviewr_installed]
sync_policy = "push-only"
probe = 'if herdr plugin list 2>/dev/null | grep -q persiyanov.reviewr; then exit 100; fi; exit 0'

[targets.reviewr_installed.hooks]
pre_push = 'herdr plugin install persiyanov/herdr-reviewr --yes'

[targets.d_config_herdr_plugins_config]
source = "files/config/herdr/plugins/config"
path = "~/.config/herdr/plugins/config"
