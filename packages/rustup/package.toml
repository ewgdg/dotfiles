id = "rustup"
description = "Rust toolchain bootstrap"

[targets.rustup_toolchain_ready]
sync_policy = "push-only"
probe = 'bash "$DOTMAN_PACKAGE_ROOT/scripts/probe_rustup.sh"'

[targets.rustup_toolchain_ready.hooks]
pre_push = 'sh "$DOTMAN_REPO_ROOT/scripts/install_rustup.sh"'

[targets.cargo_update_installed]
sync_policy = "push-only"
probe = 'bash "$DOTMAN_PACKAGE_ROOT/scripts/probe_cargo_update.sh"'

[targets.cargo_update_installed.hooks]
pre_push = "cargo install cargo-update"
