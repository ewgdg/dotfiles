id = "rime"
description = "IBus Rime custom dictionaries"

[targets.d_config_ibus_rime]
source = "files/config/ibus/rime"
path = "~/.config/ibus/rime"
chmod = "700"
push_ignore = [
  "*",
  "!*.custom.yaml",
  "!sync/*.custom.yaml",
]
pull_ignore = [
  "*",
  "!*.custom.yaml",
  "!sync/*.custom.yaml",
]
