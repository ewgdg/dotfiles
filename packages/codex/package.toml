id = "codex"
description = "Bundled Codex CLI configuration, agents, and rules"

[vars.codex]
# Ignore vendor-bundled marketplace state during capture; keep plugin enablement tracked for now.
config_selector_args = "'model' 'model_reasoning_effort' 're:^projects\\.' 're:^mcp_servers\\.playwright\\.env$' 're:^marketplaces\\.openai-bundled$'"

[targets.f_codex_config_toml]
source = "files/codex/config.toml"
path = "~/.codex/config.toml"
chmod = "600"
render = '{{ TOML_RENDER }} --selector-type retain --selectors {{ vars.codex.config_selector_args }}'
capture = '{{ TOML_CAPTURE }} --selector-type remove --selectors {{ vars.codex.config_selector_args }}'

[targets.f_codex_agents_md]
source = "files/codex/AGENTS.md"
path = "~/.codex/AGENTS.md"

[targets.d_codex_rules]
source = "files/codex/rules"
path = "~/.codex/rules"

[targets.d_codex_agents]
source = "files/codex/agents"
path = "~/.codex/agents"

[targets.f_codex_hooks_json]
source = "files/codex/hooks.json"
path = "~/.codex/hooks.json"
