id = "codex"
description = "Bundled Codex CLI configuration, agents, and rules"
depends = ["agents"]

[vars.codex]
# Ignore vendor-bundled marketplace state during capture; keep plugin enablement tracked for now.
config_selectors = [
  "model",
  "model_reasoning_effort",
  "re:^projects\\.",
  "re:^mcp_servers\\.playwright\\.env$",
  "re:^marketplaces\\.openai-bundled$",
  "tui.model_availability_nux",
  "notice",
  "re:^notice\\.",
  "re:marketplaces.*",
  "mcp_servers.node_repl",
  "mcp_servers.computer-use",
  "notify",
  "hooks.state",
  "re:^shell_environment_policy\\.",
]

[targets.f_codex_config_toml]
source = "files/codex/config.toml"
path = "~/.codex/config.toml"
chmod = "600"
render = '{{ TOML_RENDER }} --selector-type retain --selectors {{ vars.codex.config_selectors|shell_args }}'
capture = '{{ TOML_CAPTURE }} --selector-type remove --selectors {{ vars.codex.config_selectors|shell_args }}'

[targets.codex_global_instructions]
sync_policy = "push-only"
probe = 'sh "$DOTMAN_REPO_ROOT/scripts/manage_relative_symlink.sh" probe "~/.codex/AGENTS.md" "~/.agents/AGENTS.md"'

[targets.codex_global_instructions.hooks]
pre_push = 'sh "$DOTMAN_REPO_ROOT/scripts/manage_relative_symlink.sh" apply "~/.codex/AGENTS.md" "~/.agents/AGENTS.md"'

[targets.d_codex_rules]
source = "files/codex/rules"
path = "~/.codex/rules"

[targets.d_codex_agents]
source = "files/codex/agents"
path = "~/.codex/agents"

[targets.f_codex_hooks_json]
source = "files/codex/hooks.json"
path = "~/.codex/hooks.json"
render = '{{ UV_RUN }} "$DOTMAN_REPO_ROOT/scripts/text_rewrite.py" home expand "$DOTMAN_REPO_PATH"'
capture = '{{ UV_RUN }} "$DOTMAN_REPO_ROOT/scripts/text_rewrite.py" home collapse "$DOTMAN_LIVE_PATH"'

[targets.f_codex_herdr_agent_state_sh]
source = "files/codex/herdr-agent-state.sh"
path = "~/.codex/herdr-agent-state.sh"
chmod = "755"
