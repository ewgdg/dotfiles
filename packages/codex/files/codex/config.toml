approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
personality = "pragmatic"
plan_mode_reasoning_effort = "xhigh"
approvals_reviewer = "guardian_subagent"

# model_provider = "openai_http"

[model_providers.openai_http]
name = "OpenAI HTTP only"
wire_api = "responses"
requires_openai_auth = true
supports_websockets = false
base_url = "https://chatgpt.com/backend-api/codex"

[profiles.obsidian]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
approval_policy = "on-request"

# Extra settings that only apply when `sandbox = "workspace-write"`.
[sandbox_workspace_write]
# Allow the command being run inside the sandbox to make outbound network
# requests. Disabled by default.
network_access = true
writable_roots = [
  "~/.local/share/Trash",
  "~/.local/share",
  "~/.cache",
  "/run/user",
  "~/.cache",
  "~/.npm",
  "~/.agents",
  "~/.codex",
  "~/.context-mode",
  "~/.codegraphcontext",
  "~/sandbox",
  "~/projects/knowledgebase",
]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

# [mcp_servers.chrome-devtools]
# command = "npx"
# args = ["-y", "chrome-devtools-mcp@latest", "--auto-connect", "--category-performance=false", "--category-network=false", "--performance-crux=false", "--categoryEmulation=false"]

# [mcp_servers.playwright]
# command = "npx"
# args = ["@playwright/mcp@latest", "--extension"]
#
# [mcp_servers.playwright.env]
# PLAYWRIGHT_MCP_EXTENSION_TOKEN = "I9S5fXuyi_lkPuqJ1WYFzeEXDOeevg578KwN1WD6rr8"

[features]
multi_agent = true
search_tool = true
guardian_approval = true
codex_hooks = true
terminal_resize_reflow = true
memories = true
external_migration = true
goals = true

[tui]
status_line = ["current-dir", "git-branch", "model-with-reasoning", "context-remaining", "weekly-limit", "fast-mode", "total-input-tokens"]

[plugins."computer-use@openai-bundled"]
enabled = true

