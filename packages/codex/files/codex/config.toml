approval_policy = "on-request"
# sandbox_mode = "workspace-write"
sandbox_mode = "danger-full-access"
web_search = "live"
personality = "pragmatic"
plan_mode_reasoning_effort = "xhigh"
approvals_reviewer = "auto_review"
model_provider = "codex-lb"

[model_providers.codex-lb]
name = "Codex LB"
base_url = "https://codexlb.service.xianzzz.com/backend-api/codex"
wire_api = "responses"
supports_websockets = true
# requires_openai_auth = true

# Extra settings that only apply when `sandbox = "workspace-write"`.
[sandbox_workspace_write]
# Allow the command being run inside the sandbox to make outbound network
# requests. Disabled by default.
network_access = true
writable_roots = [
  "~/.local/share/Trash",
  "~/.local/share",
  "~/.cache",
  "/run/user",
  "~/.cache",
  "~/.npm",
  "~/.agents",
  "~/.codex",
  "~/.context-mode",
  "~/.codegraphcontext",
  "~/sandbox",
  "~/projects/knowledgebase",
]

[features]
multi_agent = true
search_tool = true
guardian_approval = true
hooks = true
terminal_resize_reflow = true
memories = true
external_migration = true
goals = true
js_repl = false

[tui]
status_line = ["current-dir", "git-branch", "model-with-reasoning", "context-remaining", "weekly-limit", "fast-mode", "total-input-tokens", "five-hour-limit"]
status_line_use_colors = true

[apps.github]
enabled = false

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[desktop]
followUpQueueMode = "queue"
dock-icon-preference = "codex-system"
enabled-reasoning-efforts = ["low", "medium", "high", "xhigh", "max", "ultra"]

