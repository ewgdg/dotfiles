id = "git"
description = "Git and Lazygit workflow configuration"

[targets.f_gitconfig]
source = "files/gitconfig"
path = "~/.gitconfig"
chmod = "600"
preset = "jinja-editor"

[targets.f_config_lazygit_config_yml]
source = "files/config/lazygit/config.yml"
path = "~/.config/lazygit/config.yml"

[hooks]
pre_push = [
  "{{ INSTALL }} git lazygit",
]
