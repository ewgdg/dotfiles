id = "git"
description = "Git and Lazygit workflow configuration"

[targets.f_gitconfig]
source = "files/gitconfig"
path = "~/.gitconfig"
chmod = "600"
pull_view_repo = "render"
pull_view_live = "raw"
reconcile_io = "tty"
reconcile = '''
dotman reconcile editor \
  --review-repo-path "${DOTMAN_REVIEW_REPO_PATH:-$DOTMAN_REPO_PATH}" \
  --review-live-path "${DOTMAN_REVIEW_LIVE_PATH:-$DOTMAN_LIVE_PATH}" \
  --repo-path "$DOTMAN_REPO_PATH" \
  --live-path "$DOTMAN_LIVE_PATH"
'''

[targets.f_config_lazygit_config_yml]
source = "files/config/lazygit/config.yml"
path = "~/.config/lazygit/config.yml"

[hooks]
pre_push = [
  "{{ INSTALL }} git lazygit",
]
