id = "noctalia"
description = "Noctalia shell configuration"

depends = [
  "linux/status-notifier",
]

[targets.d_config_noctalia]
source = "files/config/noctalia"
path = "~/.config/noctalia"

[targets.d_config_noctalia.ignore]
shared = [
  "plugins/",
  "!plugins/*/settings.json",
  "!plugins/pinned-window/",
]

[hooks]
pre_push = [
  "{{ INSTALL }} noctalia-qs noctalia-shell",
]
