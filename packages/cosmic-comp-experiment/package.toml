id = "cosmic-comp-experiment"
description = "Official COSMIC session configuration snapshot"


[targets.d_config_cosmic_theme_mode]
source = "files/config/cosmic/com.system76.CosmicTheme.Mode/v1"
path = "~/.config/cosmic/com.system76.CosmicTheme.Mode/v1"

[targets.d_config_cosmic_comp_config]
source = "files/config/cosmic/com.system76.CosmicComp/v1"
path = "~/.config/cosmic/com.system76.CosmicComp/v1"

[targets.d_config_cosmic_shortcuts]
source = "files/config/cosmic/com.system76.CosmicSettings.Shortcuts/v1"
path = "~/.config/cosmic/com.system76.CosmicSettings.Shortcuts/v1"

[targets.d_config_cosmic_window_rules]
source = "files/config/cosmic/com.system76.CosmicSettings.WindowRules/v1"
path = "~/.config/cosmic/com.system76.CosmicSettings.WindowRules/v1"

[hooks]
# Official COSMIC session pulls the compositor, portal, shell components, settings daemon, and XWayland.
pre_push = [
  "{{ INSTALL }} cosmic-session",
]
