id = "linux/sunshine"
description = "Sunshine host streaming configuration"

# WayVNC provides an out-of-band control path for approving Sunshine portal dialogs.
# Avahi provides mDNS advertisement on the physical LAN only.
depends = [
  "wayvnc",
  "linux/avahi",
]

[targets.d_config_sunshine]
source = "files/config/sunshine"
path = "~/.config/sunshine"

[targets.d_config_sunshine.ignore]
shared = [
  "tests/",
  "sunshine-*.conf",
  "sunshine.conf",
  "credentials/",
  "sunshine.log",
  "portal_token",
  "*_state.json",
]

[targets.f_config_sunshine_sunshine_conf]
source = "files/sunshine.conf"
path = "~/.config/sunshine/sunshine.conf"
preset = "jinja-patch-editor"

[targets.d_config_systemd_user_sunshine_service_d]
source = "files/config/systemd/user/sunshine.service.d"
path = "~/.config/systemd/user/sunshine.service.d"

[hooks]
pre_push = [
  "{{ INSTALL }} sunshine",
]
post_push = [
  '{{ ENSURE_SYSTEMD }} user sunshine.service',
]
