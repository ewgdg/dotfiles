id = "linux/faugus-launcher"
description = "Install and config for Faugus Launcher"

depends = [
  "linux/xembedsniproxy",
]

[targets.f_config_faugus_launcher_config_ini]
source = "files/config/faugus-launcher/config.ini"
path = "~/.config/faugus-launcher/config.ini"
render = '{{ UV_RUN }} "$DOTMAN_REPO_ROOT/scripts/kv_transform.py" render "$DOTMAN_REPO_PATH" --live-path "$DOTMAN_LIVE_PATH" --home-expand-keys default-prefix --require-keys default-prefix'
capture = '{{ UV_RUN }} "$DOTMAN_REPO_ROOT/scripts/kv_transform.py" capture "$DOTMAN_LIVE_PATH" --remove-keys donate-last playtime --home-collapse-keys default-prefix --require-keys default-prefix'

[targets.f_config_faugus_launcher_envar_txt]
source = "files/config/faugus-launcher/envar.txt"
path = "~/.config/faugus-launcher/envar.txt"

[hooks]
pre_push = [
  "{{ INSTALL }} faugus-launcher",
]
