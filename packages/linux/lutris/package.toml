id = "linux/lutris"
description = "Install and configs for Lutris, a linux gaming platform"

[targets.f_local_state_dotfiles_installed_linux_lutris]
source = "files/local/state/dotfiles/installed/linux/lutris"
path = "~/.local/state/dotfiles/installed/linux/lutris"

# Marker exists so install-only packages still have a managed target.
[hooks]
pre_push = [
  # wine-gecko optional
  "{{ INSTALL }} lutris wine-mono proton-ge-custom-bin",
]
