# Minimal Hyprland config for trying Hyprland while keeping main Niri/Sway habits.
# Target: Arch stable Hyprland 0.54.x hyprland.conf syntax.
# Notes:
# - Hyprland 0.55+ deprecates hyprland.conf in favor of hyprland.lua.
# - This experiment uses native scrolling layout; no Niri helper scripts are ported.
# - Missing native equivalents stay as TODO comments.

### Variables
$mainMod = SUPER
$term = ghostty
$launcher = noctalia msg panel-toggle launcher
$launcher_windows = noctalia msg panel-toggle launcher "/win "

# Workspace map mirrors Niri declaration order:
# 1 stash | 2 games | 3 AI | 4 notes | 5 logs | 6 main | 7-9 spare

### Session / environment
# No static monitor rules. Sunshine/runtime monitor control decides output state.
# Use `hyprctl reload config-only`; full reload or compositor restart may re-probe outputs.

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,gtk3
env = QS_ICON_THEME,Papirus-Dark
env = QT_IM_MODULE,fcitx
env = QT_IM_MODULES,wayland;fcitx;ibus
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = XCURSOR_THEME,Bibata-Modern-Ice

# Runtime display vars only exist after Hyprland starts. Import them before
# starting Noctalia so portals, user services, and shell-spawned apps agree.
exec-once = sh -lc 'if command -v dbus-update-activation-environment >/dev/null 2>&1; then dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP XCURSOR_THEME QT_QPA_PLATFORMTHEME QS_ICON_THEME QT_IM_MODULE QT_IM_MODULES XMODIFIERS SDL_IM_MODULE; else systemctl --user import-environment WAYLAND_DISPLAY DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP XCURSOR_THEME QT_QPA_PLATFORMTHEME QS_ICON_THEME QT_IM_MODULE QT_IM_MODULES XMODIFIERS SDL_IM_MODULE; fi; systemctl --user start hyprland-shell.service'

# Native autostart only.
exec-once = launch-desktop-app memos '^chrome-.*-Default[.]desktop$'
exec-once = obsidian
exec-once = launch-desktop-app ChatGPT '^chrome-.*-Default[.]desktop$'
exec-once = launch-desktop-app 'Google AI Studio' '^chrome-.*-Default[.]desktop$'
exec-once = ghostty --title=logs-journalctl -e journalctl -f -n 20

### Output / look
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(ffc87fff)
    col.inactive_border = rgba(505050aa)
    layout = scrolling
    # Stop directional focus at screen edge instead of wrapping/fallback-focusing.
    no_focus_fallback = true
    resize_on_border = false
}

scrolling {
    # Niri-like default column width and presets, using Hyprland-native layout messages.
    fullscreen_on_one_column = false
    column_width = 0.5
    focus_fit_method = 1
    follow_focus = true
    follow_min_visible = 0.4
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
    direction = right
}

decoration {
    rounding = 12
    active_opacity = 1.0
    # Avoid focus-switch flicker: opacity changes animate every time focus moves.
    inactive_opacity = 1.0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = true
    animation = windows, 1, 2, default
    animation = windowsMove, 1, 2, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, default, slidevert
    animation = specialWorkspace, 1, 2, default, slidevert
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    background_color = rgb(000000)
    # Config autoreload is off. Reload manually without resetting runtime monitor
    # state via: hyprctl reload config-only
    disable_autoreload = true
    # Hyprland cannot do Niri-style per-window maximize preservation on focus change.
    # 2 avoids transferring maximize/fullscreen state to the newly focused window.
    on_focus_under_fullscreen = 2
    # VFR can make repaint artifacts around Chromium/fractional-scale windows more visible.
    vfr = false
}

xwayland {
    enabled = true
    force_zero_scaling = true
}

cursor {
    no_warps = true
}

### Input
input {
    kb_layout = us
    kb_options = ctrl:nocaps
    repeat_delay = 600
    repeat_rate = 25

    follow_mouse = 0
    sensitivity = 0
    accel_profile = flat

    touchpad {
        tap-to-click = true
        tap-and-drag = true
        disable_while_typing = true
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

### Workspaces
workspace = 1, defaultName:stash, persistent:true
workspace = 2, defaultName:games, persistent:true
workspace = 3, defaultName:AI, persistent:true
workspace = 4, defaultName:notes, persistent:true
workspace = 5, defaultName:logs, persistent:true
workspace = 6, defaultName:main, persistent:true
workspace = 7, defaultName:spare-7
workspace = 8, defaultName:spare-8
workspace = 9, defaultName:spare-9

### App placement. Keep only simple native rules.
windowrule {
    name = steam-games-workspace
    match:class = ^steam$
    workspace = 2 silent
}

windowrule {
    name = faugus-games-workspace
    match:class = ^(lutris|faugus-launcher)$
    workspace = 2 silent
}

windowrule {
    name = battle-net-games-workspace
    match:title = ^Battle\.net$
    workspace = 2 silent
}

windowrule {
    name = wine-tray-stash-workspace
    match:class = ^explorer\.exe$
    workspace = 1 silent
}

windowrule {
    name = obsidian-notes-workspace
    match:class = (?i)^obsidian$
    workspace = 4 silent
}

windowrule {
    name = memos-notes-workspace
    match:title = ^Memos.*$
    workspace = 4 silent
}

windowrule {
    name = chatgpt-ai-workspace
    match:title = ^ChatGPT.*$
    workspace = 3 silent
}

windowrule {
    name = google-ai-studio-workspace
    match:title = ^Google AI Studio.*$
    workspace = 3 silent
}

windowrule {
    name = logs-workspace
    match:title = ^logs-journalctl$
    workspace = 5 silent
}

windowrule {
    name = onepassword-floating
    match:class = (?i)^1password(-quickaccess)?$
    float = true
    center = true
}

windowrule {
    name = goldendict-floating
    match:class = (?i).*goldendict.*
    float = true
    size = 800 600
    center = true
}

windowrule {
    name = floating-border-on
    match:float = true
    border_size = 2
}

# TODO: add stronger maximize-on-open rules after observing Hyprland class/title values.
# TODO: add Fcitx / Steam toast special cases after observing `hyprctl clients` output.

### Key bindings
# Applications.
bind = $mainMod, Return, exec, $term
bind = $mainMod, space, exec, $launcher
bind = $mainMod SHIFT, space, exec, $launcher_windows
bind = ALT, Tab, exec, $launcher_windows
bind = $mainMod, b, exec, google-chrome-stable
bind = $mainMod, d, exec, goldendict
bind = $mainMod CTRL, d, exec, goldendict-search
bind = $mainMod, e, exec, nautilus --new-window
bind = $mainMod CTRL SHIFT, space, exec, 1password --quick-access

# Noctalia actions.
bind = $mainMod CTRL SHIFT, l, exec, noctalia msg session lock
bindl = , XF86AudioPlay, exec, noctalia msg media toggle
bindl = , XF86AudioPrev, exec, noctalia msg media previous
bindl = , XF86AudioNext, exec, noctalia msg media next
bindel = , XF86AudioRaiseVolume, exec, noctalia msg volume-up
bindel = , XF86AudioLowerVolume, exec, noctalia msg volume-down
bindl = , XF86AudioMute, exec, noctalia msg volume-mute
bindl = , XF86AudioMicMute, exec, noctalia msg mic-mute
bindel = , XF86MonBrightnessUp, exec, noctalia msg brightness-up
bindel = , XF86MonBrightnessDown, exec, noctalia msg brightness-down

# Window lifecycle.
bind = $mainMod, q, killactive,
bind = $mainMod SHIFT, c, exec, hyprctl reload config-only
bind = $mainMod CTRL SHIFT, Delete, exec, hyprctl dispatch exit

# Focus. Horizontal focus uses scrolling layout messages to keep movement on the tape.
bind = $mainMod, left, layoutmsg, focus l
bind = $mainMod, right, layoutmsg, focus r
bind = $mainMod, h, layoutmsg, focus l
bind = $mainMod, l, layoutmsg, focus r
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, comma, exec, sh -lc 'for _ in $(seq 1 30); do hyprctl dispatch layoutmsg focus l >/dev/null; done'
bind = $mainMod, period, exec, sh -lc 'for _ in $(seq 1 30); do hyprctl dispatch layoutmsg focus r >/dev/null; done'

# Move/swap windows and columns.
bind = $mainMod CTRL, left, layoutmsg, swapcol l
bind = $mainMod CTRL, right, layoutmsg, swapcol r
bind = $mainMod CTRL, h, layoutmsg, swapcol l
bind = $mainMod CTRL, l, layoutmsg, swapcol r
bind = $mainMod CTRL, down, movewindow, d
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, j, movewindow, d
bind = $mainMod CTRL, k, movewindow, u

# Monitors.
bind = $mainMod SHIFT, left, focusmonitor, l
bind = $mainMod SHIFT, right, focusmonitor, r
bind = $mainMod SHIFT, up, focusmonitor, u
bind = $mainMod SHIFT, down, focusmonitor, d
bind = $mainMod SHIFT, h, focusmonitor, l
bind = $mainMod SHIFT, l, focusmonitor, r
bind = $mainMod SHIFT, k, focusmonitor, u
bind = $mainMod SHIFT, j, focusmonitor, d
bind = $mainMod CTRL SHIFT, left, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, right, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL SHIFT, up, movecurrentworkspacetomonitor, u
bind = $mainMod CTRL SHIFT, down, movecurrentworkspacetomonitor, d

# Workspace switching follows positional Vim: u is j/down/next, i is k/up/previous.
bind = $mainMod, u, workspace, e+1
bind = $mainMod, i, workspace, e-1
bind = $mainMod SHIFT, u, movetoworkspace, e+1
bind = $mainMod SHIFT, i, movetoworkspace, e-1
bind = $mainMod CTRL, u, movetoworkspacesilent, e+1
bind = $mainMod CTRL, i, movetoworkspacesilent, e-1
bind = $mainMod, s, workspace, 1
bind = $mainMod CTRL, s, movetoworkspacesilent, 1
bind = $mainMod, n, workspace, 4
bind = $mainMod CTRL, n, movetoworkspacesilent, 4
bind = $mainMod, a, workspace, 3
bind = $mainMod CTRL, a, movetoworkspacesilent, 3
bind = $mainMod, Tab, workspace, previous

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod CTRL, mouse_down, movetoworkspacesilent, e+1
bind = $mainMod CTRL, mouse_up, movetoworkspacesilent, e-1

# Native approximation for Niri pin/stash: Hyprland special workspace.
bind = $mainMod, p, togglespecialworkspace, stash
bind = $mainMod SHIFT, p, movetoworkspacesilent, special:stash
bind = $mainMod, o, togglespecialworkspace, stash
# TODO: direct equivalent for summon pinned window / move beside pinned.

# Layout / state.
bind = $mainMod, f, fullscreenstate, 1 1
bind = $mainMod SHIFT, f, fullscreen, 0
bind = $mainMod, m, fullscreenstate, 1 1
bind = $mainMod CTRL, f, layoutmsg, colresize 1.0
bind = $mainMod, minus, layoutmsg, colresize -0.1
bind = $mainMod, equal, layoutmsg, colresize +0.1
bind = $mainMod, Backspace, layoutmsg, colresize 0.5
bind = $mainMod SHIFT, minus, layoutmsg, colresize all 0.333
bind = $mainMod SHIFT, equal, layoutmsg, colresize all 0.667
bind = $mainMod, z, togglefloating,
bind = $mainMod SHIFT, z, workspaceopt, allfloat
bind = $mainMod, bracketleft, layoutmsg, promote
bind = $mainMod, bracketright, layoutmsg, swapcol r
bind = $mainMod, t, togglegroup,
bind = $mainMod SHIFT, t, changegroupactive, f

# Scrolling mode: quick repeated controls for Hyprland's native scrolling layout.
bind = $mainMod, r, submap, scroll
submap = scroll
binde = , h, layoutmsg, move -col
binde = , l, layoutmsg, move +col
binde = , left, layoutmsg, move -col
binde = , right, layoutmsg, move +col
binde = , j, movefocus, d
binde = , k, movefocus, u
binde = , down, movefocus, d
binde = , up, movefocus, u
binde = , comma, layoutmsg, swapcol l
binde = , period, layoutmsg, swapcol r
binde = , minus, layoutmsg, colresize -0.1
binde = , equal, layoutmsg, colresize +0.1
bind = , Backspace, layoutmsg, colresize 0.5
bind = , f, layoutmsg, fit active
bind = , a, layoutmsg, fit all
bind = , v, layoutmsg, fit visible
bind = , r, layoutmsg, togglefit
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Emergency escape for stuck submaps.
bindu = $mainMod CTRL, Escape, submap, reset

# Mouse bindings.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
