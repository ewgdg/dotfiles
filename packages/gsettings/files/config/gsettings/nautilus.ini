[org.gnome.nautilus.icon-view.*]
captions = __RESET__
default-zoom-level = __RESET__

[org.gnome.nautilus.list-view.*]
default-column-order = __RESET__
default-visible-columns = __RESET__
default-zoom-level = __RESET__
use-tree-view = __RESET__

[org.gnome.nautilus.preferences.*]
always-use-location-entry = __RESET__
click-policy = 'double'
date-time-format = 'simple'
default-folder-viewer = 'icon-view'
default-sort-in-reverse-order = false
default-sort-order = 'name'
fts-enabled = __RESET__
migrated-gtk-settings = true
mouse-back-button = uint32 8
mouse-forward-button = uint32 9
mouse-use-extra-buttons = true
open-folder-on-dnd-hover = __RESET__
recursive-search = 'local-only'
search-filter-time-type = 'last_modified'
show-create-link = true
show-delete-permanently = false
show-directory-item-counts = 'local-only'
show-hidden-files = __RESET__
show-image-thumbnails = 'always'
thumbnail-limit = __RESET__

