id = "ssh"
description = "SSH identity and client configuration"

[targets.d_ssh]
source = "files/ssh"
path = "~/.ssh"
chmod = "700"
push_ignore = [
  "known_hosts*",
  "config",
  "agent",
]
pull_ignore = [
  "known_hosts*",
  "config",
  "agent",
]

[targets.f_ssh_config]
source = "files/ssh/config"
path = "~/.ssh/config"
preset = "jinja-patch-editor"
