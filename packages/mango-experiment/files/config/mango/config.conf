# Minimal Mango config for trying Mango while keeping main Niri habits.
# Docs: https://github.com/mangowm/mango/wiki/
#
# Intentional simplifications:
# - Mango tags replace Niri named workspaces.
# - Mango global window is closest native replacement for Niri pin/unpin.
# - No Niri helper scripts are reimplemented here.
# - Missing native equivalents stay as TODO comments.

# Session-wide environment used by Mango-spawned apps.
env=XDG_CURRENT_DESKTOP,mango
env=QT_QPA_PLATFORMTHEME,gtk3
env=QS_ICON_THEME,Papirus-Dark
env=QT_IM_MODULE,fcitx
env=QT_IM_MODULES,wayland;fcitx;ibus
env=XMODIFIERS,@im=fcitx
env=SDL_IM_MODULE,fcitx
env=XCURSOR_THEME,Bibata-Modern-Ice
env=XCURSOR_SIZE,24

# Mango imports WAYLAND_DISPLAY, DISPLAY, XDG_CURRENT_DESKTOP, and cursor vars itself.
# Import only repo-specific session vars before starting shell/autostart gate.
exec-once=sh -lc 'vars="QT_QPA_PLATFORMTHEME QS_ICON_THEME QT_IM_MODULE QT_IM_MODULES XMODIFIERS SDL_IM_MODULE"; if command -v dbus-update-activation-environment >/dev/null 2>&1; then dbus-update-activation-environment --systemd $vars; else systemctl --user import-environment $vars; fi; systemctl --user start mango-shell.service'

# Native autostart only.
exec-once=gtk-launch chrome-jfkapgfcidgflggmbfeehbddhihebalf-Default
exec-once=obsidian
exec-once=gtk-launch chrome-cadlkienfkclaiaibeoongdcgmdikeeg-Default
exec-once=gtk-launch chrome-bcmmjkglicliekcndffbfgcfopnidllp-Default
exec-once=alacritty --title logs-journalctl -e journalctl -f -n 20

# Window look: keep close to Niri, but use Mango-native knobs only.
blur=0
blur_layer=0
shadows=0
layer_shadows=0
shadow_only_floating=1
border_radius=12
focused_opacity=1.0
unfocused_opacity=0.9
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_duration_open=400
animation_duration_close=800

# Scroller is closest native fit to Niri column workflow.
scroller_default_proportion=0.5
scroller_default_proportion_single=0.5
scroller_focus_center=0
scroller_proportion_preset=0.33333,0.5,0.66667

# Niri-like basics.
no_border_when_single=0
sloppyfocus=0
warpcursor=0
enable_hotarea=0
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us
xkb_rules_options=ctrl:nocaps

tap_to_click=1
tap_and_drag=1
disable_while_typing=1
trackpad_natural_scrolling=1
mouse_natural_scrolling=0

# Appearance.
gappih=5
gappiv=5
gappoh=5
gappov=5
borderpx=2
rootcolor=0x000000ff
bordercolor=0x505050ff
focuscolor=0xffc87fff
maximizescreencolor=0xffc87fff
urgentcolor=0x9b0000ff

# Tag map:
# 1 main | 2 stash | 3 notes | 4 AI | 5 logs | 6 games | 7-9 spare
# All tags use scroller to stay close to Niri's horizontal-column workflow.
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# App placement. Keep only simple native rules.
windowrule=tags:6,appid:^steam$
windowrule=tags:6,appid:^lutris$
windowrule=tags:6,title:^Battle\.net$
windowrule=tags:2,appid:^explorer\.exe$
windowrule=tags:3,appid:^obsidian$
windowrule=tags:3,title:^Memos$
windowrule=tags:4,title:^ChatGPT$
windowrule=tags:4,title:^Google AI Studio$
windowrule=tags:5,title:^logs-journalctl$
windowrule=isfloating:1,appid:^1password(-quickaccess)?$
windowrule=isfloating:1,width:800,height:600,appid:(?i)goldendict
# TODO: Mango docs found no clean native replacement for Niri's maximize-on-open rules.
# TODO: Mango docs found no clean native replacement for Niri Fcitx / Steam toast special cases.

# Key bindings.
# Keep Niri muscle memory where Mango has close native actions.
bind=SUPER,Return,spawn,alacritty
bind=SUPER,space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=SUPER+SHIFT,space,spawn,qs -c noctalia-shell ipc call launcher windows
bind=SUPER,b,spawn,google-chrome-stable
bind=SUPER,d,spawn,goldendict
bind=SUPER+CTRL,d,spawn,goldendict-search
bind=SUPER,e,spawn,nautilus --new-window
bind=SUPER+CTRL+SHIFT,space,spawn,1password --quick-access

bind=SUPER,w,toggleoverview
bind=SUPER,q,killclient
bind=SUPER+SHIFT,c,reload_config
bind=SUPER+CTRL+SHIFT,Delete,quit

# Noctalia actions.
bind=SUPER+CTRL+SHIFT,l,spawn,qs -c noctalia-shell ipc call lockScreen lock
bindl=NONE,XF86AudioPlay,spawn,qs -c noctalia-shell ipc call media playPause
bindl=NONE,XF86AudioPrev,spawn,qs -c noctalia-shell ipc call media previous
bindl=NONE,XF86AudioNext,spawn,qs -c noctalia-shell ipc call media next
bindl=NONE,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call volume increase
bindl=NONE,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bindl=NONE,XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput
bindl=NONE,XF86AudioMicMute,spawn,qs -c noctalia-shell ipc call volume muteInput
bindl=NONE,XF86MonBrightnessUp,spawn,qs -c noctalia-shell ipc call brightness increase
bindl=NONE,XF86MonBrightnessDown,spawn,qs -c noctalia-shell ipc call brightness decrease

bind=SUPER,Left,focusdir,left
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Right,focusdir,right
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,comma,focusstack,prev
bind=SUPER,period,focusstack,next

bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,Down,exchange_client,down
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,Right,exchange_client,right
bind=SUPER+CTRL,h,exchange_client,left
bind=SUPER+CTRL,j,exchange_client,down
bind=SUPER+CTRL,k,exchange_client,up
bind=SUPER+CTRL,l,exchange_client,right

bind=SUPER+SHIFT,Left,focusmon,left
bind=SUPER+SHIFT,Down,focusmon,down
bind=SUPER+SHIFT,Up,focusmon,up
bind=SUPER+SHIFT,Right,focusmon,right
bind=SUPER+CTRL+SHIFT,Left,tagmon,left
bind=SUPER+CTRL+SHIFT,Down,tagmon,down
bind=SUPER+CTRL+SHIFT,Up,tagmon,up
bind=SUPER+CTRL+SHIFT,Right,tagmon,right

# Workspace switching follows positional Vim: u is j/down/next, i is k/up/previous.
bind=SUPER,u,viewtoright_have_client,0
bind=SUPER,i,viewtoleft_have_client,0
bind=SUPER+SHIFT,u,tagtoright,0
bind=SUPER+SHIFT,i,tagtoleft,0
bind=SUPER+CTRL,u,tagtoright,0
bind=SUPER+CTRL,i,tagtoleft,0
bind=SUPER,s,view,2,0
bind=SUPER+CTRL,s,tag,2,0
bind=SUPER,n,view,3,0
bind=SUPER+CTRL,n,tag,3,0
bind=SUPER,a,view,4,0
bind=SUPER+CTRL,a,tag,4,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+CTRL,1,tag,1,0
bind=SUPER+CTRL,2,tag,2,0
bind=SUPER+CTRL,3,tag,3,0
bind=SUPER+CTRL,4,tag,4,0
bind=SUPER+CTRL,5,tag,5,0
bind=SUPER+CTRL,6,tag,6,0
bind=SUPER+CTRL,7,tag,7,0
bind=SUPER+CTRL,8,tag,8,0
bind=SUPER+CTRL,9,tag,9,0

# Native approximation for Niri pin/unpin: make focused window global across tags.
bind=SUPER,p,toggleglobal
bind=SUPER+SHIFT,p,toggleglobal
# TODO: Mango has no documented native equivalent for summon pinned window / move beside pinned.

bind=SUPER,r,switch_proportion_preset
bind=SUPER+SHIFT,r,set_proportion,1.0
bind=SUPER,f,togglemaximizescreen
bind=SUPER+SHIFT,f,togglefullscreen
bind=SUPER,m,togglemaximizescreen
bind=SUPER+CTRL,f,togglemaximizescreen

bind=SUPER,z,togglefloating
# TODO: Mango docs found no native equivalent for Niri focus-between-floating-and-tiling.
# TODO: Mango docs found no native equivalent for Niri tabbed columns.

# TODO: Mango docs found no clean native replacement for Niri power-off-monitors bind.
# TODO: wire screenshot keys if you want an external screenshot tool in Mango too.

mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
