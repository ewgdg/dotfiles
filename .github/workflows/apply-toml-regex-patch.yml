name: Apply TOML regex key-path patch

on:
  push:
    branches:
      - agent/toml-regex-key-paths

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and validate patch
        run: |
          git apply --check .github/patches/toml-regex-key-paths.patch
          git apply .github/patches/toml-regex-key-paths.patch
          rm .github/patches/toml-regex-key-paths.patch
          rm .github/workflows/apply-toml-regex-patch.yml
          git diff --check
          python -m py_compile scripts/toml_transform.py

      - name: Commit applied changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Support TOML regex key-path selectors"
          git push
