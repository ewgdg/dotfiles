name: Apply plist nested key path patch

on:
  push:
    branches:
      - agent/plist-nested-key-paths
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - uses: astral-sh/setup-uv@v6

      - name: Apply patch
        run: |
          cat .github/patches/plist-nested-key-paths.part-* > /tmp/plist-nested-key-paths.patch
          git apply --recount --check /tmp/plist-nested-key-paths.patch
          git apply --recount /tmp/plist-nested-key-paths.patch
          git diff --check

      - name: Validate
        run: |
          python -m py_compile scripts/plist_transform.py
          uv run pytest tests/test_plist_transform.py tests/test_package_script_runtime.py

      - name: Commit result
        run: |
          rm -f .github/patches/plist-nested-key-paths.part-*
          rm -f .github/workflows/apply-plist-nested-key-paths.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Support nested plist key path selectors"
          git push
