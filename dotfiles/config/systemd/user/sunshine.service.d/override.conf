[Unit]
# Ensure Sunshine starts after the graphical session (Wayland/Hyprland)
After=graphical-session.target
# After=xdg-desktop-autostart.target

[Service]
StandardOutput=null
StandardError=null
# Clear ExecStartPre from vendor unit (we don't need the extra sleep)
ExecStartPre=

[Install]
WantedBy=default.target
