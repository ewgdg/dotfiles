global_prep_cmd = [{"do":"sh -c \"gnome-monitor-config set -LM DP-4 --primary --mode ${SUNSHINE_CLIENT_WIDTH}x${SUNSHINE_CLIENT_HEIGHT}@${SUNSHINE_CLIENT_FPS}.000 --transform normal\"","undo":"gnome-monitor-config set -LM DP-4 --primary --mode 1920x1080@60.000 --transform normal"},{"do":"sh -c \"gnome-session-inhibit --inhibit idle --reason sunshine-connection --inhibit-only > /dev/null &\"","undo":"pkill -f sunshine-connection"}]
address_family = both
