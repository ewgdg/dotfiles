approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
personality = "pragmatic"

[profiles.obsidian]
model = "gpt-5.1-codex-mini"
model_reasoning_effort = "medium"
approval_policy = "on-request"

# Extra settings that only apply when `sandbox = "workspace-write"`.
[sandbox_workspace_write]
# Allow the command being run inside the sandbox to make outbound network
# requests. Disabled by default.
network_access = true
writable_roots = [
  "~/.local/share/Trash",
  "/run/user",
  "~/.agents",
  "~/.agents/agent-tools",
  "~/.codex",
  "~/projects",
]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers."context-mode"]
command = "npx"
args = ["-y", "context-mode@latest"]

# [mcp_servers.chrome-devtools]
# command = "npx"
# args = ["-y", "chrome-devtools-mcp@latest", "--auto-connect", "--category-performance=false", "--category-network=false", "--performance-crux=false", "--categoryEmulation=false"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest", "--extension"]

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[features]
multi_agent = true
search_tool = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-remaining", "project-root", "fast-mode"]

