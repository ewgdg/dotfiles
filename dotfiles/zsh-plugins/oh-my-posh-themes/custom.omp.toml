console_title_template = "{{ .Shell }} in {{ .Folder }}"
version = 3
final_space = true

[palette]
  black = '#262B44'
  blue = '#4B95E9'
  green = '#59C9A5'
  orange = '#F07623'
  red = '#D81E5B'
  white = '#E0DEF4'
  yellow = '#F3AE35'
  pink = '#FFC8A2'
  grey = "#454545"

[secondary_prompt]
  template = "<d>> </d>"
  foreground = 'p:grey'
  background = 'transparent'

[transient_prompt]
  template = "<d>[{{ now | date \"15:04:05\"}}] ¯¬â {{ .Segments.Path.Path }}\n\ue602 </d>"
  foreground = 'p:grey'
  background = 'transparent'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    #leading_diamond = '¯éÂ'
    trailing_diamond = '¯é░'
    template = ' {{ if .SSHSession }}¯«® {{ end }}{{ .UserName }} '
    foreground = 'p:grey'
    background = 'p:pink'
    type = 'session'
    style = 'diamond'

  [[blocks.segments]]
    template = ' ¯¬â {{ path .Path .Location }} '
    foreground = 'p:white'
    powerline_symbol = '¯é░'
    background = 'p:orange'
    type = 'path'
    style = 'powerline'

    [blocks.segments.properties]
      style = 'folder'

  [[blocks.segments]]
    template = ' {{ if .UpstreamURL }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }} '
    foreground = 'p:black'
    powerline_symbol = '¯é░'
    background = 'p:green'
    type = 'git'
    style = 'powerline'
    foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:black{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:white{{ end }}', '{{ if gt .Ahead 0 }}p:white{{ end }}']
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}', '{{ if gt .Ahead 0 }}#49416D{{ end }}', '{{ if gt .Behind 0 }}#7A306C{{ end }}']

    [blocks.segments.properties]
      branch_template = '{{ trunc 25 .Branch }}'
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    template = ' ´âº '
    foreground = 'p:white'
    powerline_symbol = '¯é░'
    background = 'p:yellow'
    type = 'root'
    style = 'powerline'

  [[blocks.segments]]
    leading_diamond = '<transparent,background>¯é░</>'
    trailing_diamond = '¯é┤'
    template = ' {{ if gt .Code 0 }}´Çì{{ else }}´Çî{{ end }} '
    foreground = 'p:white'
    background = 'p:blue'
    type = 'status'
    style = 'diamond'
    background_templates = ['{{ if gt .Code 0 }}p:red{{ end }}']

    [blocks.segments.properties]
      always_enabled = true

[[blocks]]
  type = 'rprompt'

  [[blocks.segments]]
    template = '¯£ÿ '
    foreground = 'p:green'
    background = 'transparent'
    type = 'node'
    style = 'plain'

    [blocks.segments.properties]
      display_mode = 'files'
      fetch_package_manager = false
      home_enabled = false

  [[blocks.segments]]
    template = '¯ÿª '
    foreground = 'p:blue'
    background = 'transparent'
    type = 'go'
    style = 'plain'

    [blocks.segments.properties]
      fetch_version = false

  [[blocks.segments]]
    template = '¯êÁ '
    foreground = 'p:yellow'
    background = 'transparent'
    type = 'python'
    style = 'plain'

    [blocks.segments.properties]
      display_mode = 'files'
      fetch_version = false
      fetch_virtual_env = false

  [[blocks.segments]]
    template = "\ue795 <p:blue><b>{{ .Name }}</b></> "
    foreground = 'p:white'
    background = 'transparent'
    type = 'shell'
    style = 'plain'

  [[blocks.segments]]
    template = '<p:blue>[{{ .CurrentDate | date "15:04:05" }}]</>'
    foreground = 'p:white'
    background = 'transparent'
    type = 'time'
    style = 'plain'

[[blocks]]
newline = true
type = 'prompt'
alignment = 'left'
[[blocks.segments]]
type = "text"
style = "plain"
foreground = 'p:pink'
template = "\ue602" #ÔØ»
[blocks.segments.properties]
always_enabled = true

[[tooltips]]
  leading_diamond = '¯é░'
  trailing_diamond = '¯é┤'
  template = ' ¯×¡ {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
  foreground = 'p:white'
  background = 'p:orange'
  type = 'aws'
  style = 'diamond'
  tips = ['aws']

  [tooltips.properties]
    display_default = true

[[tooltips]]
  leading_diamond = '¯é░'
  trailing_diamond = '¯é┤'
  template = ' ¯»ÿ {{ .Name }} '
  foreground = 'p:white'
  background = 'p:blue'
  type = 'az'
  style = 'diamond'
  tips = ['az']

  [tooltips.properties]
    display_default = true
